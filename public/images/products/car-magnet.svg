<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" fill="none">
  <rect width="200" height="150" fill="#f9fafb"/>
  <!-- Magnet shape (U-shape) -->
  <path d="M65 45 L65 95 Q65 115 85 115 L115 115 Q135 115 135 95 L135 45 L115 45 L115 90 Q115 98 105 98 L95 98 Q85 98 85 90 L85 45 Z"
        fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Left pole (red) -->
  <rect x="65" y="45" width="20" height="30" rx="2" fill="#ef4444" opacity="0.7"/>
  <!-- Right pole (blue) -->
  <rect x="115" y="45" width="20" height="30" rx="2" fill="#3b82f6" opacity="0.7"/>
  <!-- N and S labels -->
  <text x="75" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">N</text>
  <text x="125" y="66" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="white">S</text>
  <!-- Label -->
  <text x="100" y="135" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#9ca3af" letter-spacing="1">MAGNET</text>
</svg>
