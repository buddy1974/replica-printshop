<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" fill="none">
  <rect width="200" height="150" fill="#f9fafb"/>
  <!-- Sheet with corner fold -->
  <polygon points="38,20 152,20 152,130 38,130" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Glossy diagonal sheen lines suggesting film/foil -->
  <line x1="55" y1="20" x2="152" y2="95" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="72" y1="20" x2="152" y2="72" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Corner fold triangle -->
  <polygon points="132,20 152,20 152,38" fill="#d1d5db"/>
  <!-- Fold shadow -->
  <line x1="132" y1="20" x2="152" y2="38" stroke="#9ca3af" stroke-width="1"/>
  <!-- Text label -->
  <text x="95" y="110" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9ca3af" letter-spacing="1">FOLIE</text>
</svg>
